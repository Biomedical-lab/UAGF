# UAGF – ISIC2018 Dataset Configuration
dataset: "ISIC2018"
num_classes: 7
class_names: ["MEL", "NV", "BCC", "AKIEC", "BKL", "DF", "VASC"]

# Feature dimensions (from backbone embeddings)
backbone_dims:
  convnext: 1024
  swin: 768
  efficientnet: 1536

# Feature file patterns
feature_dir: "data/ISIC2018"
feature_files:
  convnext:
    train: "1_ConvNeXtBase_ISIC2018_features_train.csv"
    val:   "1_ConvNeXtBase_ISIC2018_features_val.csv"
    test:  "1_ConvNeXtBase_ISIC2018_features_test.csv"
  swin:
    train: "2_SwinTiny_ISIC2018_features_train.csv"
    val:   "2_SwinTiny_ISIC2018_features_val.csv"
    test:  "2_SwinTiny_ISIC2018_features_test.csv"
  efficientnet:
    train: "3_EfficientNetB3_ISIC2018_features_train.csv"
    val:   "3_EfficientNetB3_ISIC2018_features_val.csv"
    test:  "3_EfficientNetB3_ISIC2018_features_test.csv"

# Column naming conventions
id_col: "index_test"
label_col: "label"
feature_prefixes:
  convnext: "conv_feat_"
  swin: "swin_feat_"
  efficientnet: "effb3_feat_"

# Training hyperparameters
training:
  seed: 42
  num_epochs: 100
  batch_size: 128
  learning_rate: 0.001
  patience: 10
  min_delta: 0.0001
  label_smoothing: 0.1

# Temperature scaling
temperature:
  gating: 1.0
  bounds: [0.1, 10.0]

# Gating MLP architecture
gating:
  hidden_dims: [1024, 512, 128]
  dropout_rates: [0.3, 0.2, 0.0]
  se_reduction: 16

# XGBoost / Optuna
xgboost:
  n_trials: 100
  n_folds: 5
  optuna_seeds: [42, 2025, 1234]
  num_boost_round: 5000
  early_stopping_rounds: 200

# Multi-seed evaluation
evaluation:
  seeds: [42, 2025, 1234, 777, 999]

# Output directories
output:
  results_dir: "results/ISIC2018"
  figures_dir: "results/ISIC2018/figures"
